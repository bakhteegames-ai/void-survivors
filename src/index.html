<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Bug Kitchen - Grab your slippers and survive a cartoon kitchen infestation!">
    <title>Bug Kitchen</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #3d2a1a;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #game-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas { display: block; }
    </style>
    <!-- Yandex Games SDK -->
    <script src="https://sdk.games.s3.yandex.net/sdk.js"></script>
</head>
<body>
    <div id="game-container"></div>
</body>
</html>
